<!DOCTYPE html>
<html lang="en" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Integrity Decks &amp; Restoration | Bay Area Deck Building &amp; Waterproofing</title>
    <meta
      name="description"
      content="Family-owned deck restoration and waterproofing serving the San Francisco Bay Area. Rated 4.9 stars. Custom decks, repairs, and high-performance waterproofing."
    />
    <!-- Canonical: update to the production domain (integritydecksrestoration.com) once DNS is pointed at this site. -->
    <link rel="canonical" href="https://integrity-decks.vercel.app/" />
    <meta name="theme-color" content="#102A47" />
    <meta name="robots" content="index, follow" />

    <!-- Fonts: linked here (not @import in CSS) so the browser discovers them with the HTML
         instead of after the stylesheet downloads — kills the late font-swap on first paint. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;500;600;700&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Motion gate: put the hero in its animation-start state BEFORE first paint, but only
         when JS is running and reduced motion is off — crawlers, no-JS, and reduced-motion
         visitors get the fully-visible static page (the pre-rendered HTML is untouched).
         Without this, the SSG hero paints visible, then GSAP snaps it hidden and replays the
         entrance — a visible flash on every refresh. GSAP stamps data-motion-ok when it takes
         over; if the bundle never loads, the timeout un-hides everything. -->
    <script>
      try {
        if (!matchMedia("(prefers-reduced-motion: reduce)").matches) {
          document.documentElement.classList.add("js-anim");
          setTimeout(function () {
            if (!document.documentElement.hasAttribute("data-motion-ok"))
              document.documentElement.classList.remove("js-anim");
          }, 2500);
        }
      } catch (e) {}
    </script>
    <!-- Inline (not in the bundled stylesheet) so the start state exists at first paint
         regardless of when the CSS bundle arrives. Mirrored in src/index.css. -->
    <style>
      .js-anim .hero-mask-inner { transform: translateY(118%); }
      .js-anim .hero-fade { opacity: 0; }
    </style>

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Integrity Decks & Restoration" />
    <meta property="og:title" content="Integrity Decks & Restoration | Bay Area Deck Building & Waterproofing" />
    <meta property="og:description" content="Family-owned deck restoration and waterproofing serving the San Francisco Bay Area. Rated 4.9 stars." />
    <meta property="og:url" content="https://integrity-decks.vercel.app/" />
    <meta name="twitter:card" content="summary_large_image" />

    <!--
      Structured data (schema.org GeneralContractor) — the machine-readable business facts
      AI engines and search read straight from the raw HTML. Fields left out (telephone, email,
      hours, CSLB license, sameAs profile links) are pending Dan's confirmation; add them here.
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "GeneralContractor",
      "name": "Integrity Decks & Restoration",
      "legalName": "Integrity Decks & Restoration General Contracting, Inc.",
      "url": "https://integrity-decks.vercel.app/",
      "description": "Family-owned deck building, restoration, and waterproofing serving the San Francisco Bay Area. Rated 4.9 stars on HomeAdvisor.",
      "knowsLanguage": ["en", "es"],
      "founder": { "@type": "Person", "name": "Refugio Barba" },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Sausalito",
        "addressRegion": "CA",
        "postalCode": "94966",
        "addressCountry": "US"
      },
      "geo": { "@type": "GeoCoordinates", "latitude": 37.8591, "longitude": -122.4853 },
      "areaServed": { "@type": "GeoCircle", "name": "San Francisco Bay Area" },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "15",
        "bestRating": "5"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Deck and Balcony Restoration" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Waterproofing and Coatings" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Custom Deck Construction" } }
        ]
      }
    }
    </script>
  </head>
  <body class="relative w-full bg-[#F4F1EA] text-[#13181D] overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
